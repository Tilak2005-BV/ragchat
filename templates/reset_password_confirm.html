<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — RAGChat</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .reset-card {
      animation: floatCard 5s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    .auth-theme-row {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-theme-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .auth-theme-pill:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .home-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .home-back-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
  </style>
</head>
<body class="reset-page">

  <div class="auth-theme-row">
    <a href="/" class="home-back-btn">← Home</a>
    <button class="auth-theme-pill" id="themeToggle">🌙 Dark</button>
  </div>

  <div class="reset-card">
    <a href="/login" class="back-link">← Back to login</a>

    <h2>Set new password</h2>
    <p class="desc">Choose a strong password for your account.</p>

    <div class="alert alert-error"   id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <div id="formSection">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" class="form-input" id="password" placeholder="Min 6 characters" autofocus>
        <div class="form-error" id="passwordError"></div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password">
        <div class="form-error" id="confirmError"></div>
      </div>
      <button class="btn btn-primary" id="resetBtn">
        <span id="resetBtnText">Update Password</span>
      </button>
    </div>

    <div id="doneSection" style="display:none; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">✅</div>
      <h3 style="font-family:var(--font-cursive); font-size:1.4rem; font-weight:600; margin-bottom:8px;">Password updated!</h3>
      <p style="font-size:0.85rem; color:var(--text3); margin-bottom:24px;">
        Your password has been changed successfully. You can now sign in.
      </p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <a href="/login" class="btn btn-primary"   style="display:inline-flex;">Sign In →</a>
        <a href="/"      class="btn btn-secondary" style="display:inline-flex;">← Home</a>
      </div>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.textContent = savedTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
    });

    // Get token from URL path
    const token      = window.location.pathname.split('/').pop();
    const resetBtn   = document.getElementById('resetBtn');
    const resetBtnText = document.getElementById('resetBtnText');

    async function doReset() {
      document.getElementById('errorAlert').style.display = 'none';
      document.querySelectorAll('.form-error').forEach(e => { e.style.display = 'none'; });

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      let valid = true;
      if (password.length < 6) {
        document.getElementById('passwordError').textContent  = 'At least 6 characters required';
        document.getElementById('passwordError').style.display = 'block';
        valid = false;
      }
      if (password !== confirm) {
        document.getElementById('confirmError').textContent  = 'Passwords do not match';
        document.getElementById('confirmError').style.display = 'block';
        valid = false;
      }
      if (!valid) return;

      resetBtn.disabled  = true;
      resetBtnText.innerHTML = '<span class="spinner"></span>';

      try {
        const res  = await fetch('/api/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('formSection').style.display = 'none';
          document.getElementById('doneSection').style.display  = 'block';
        } else {
          document.getElementById('errorAlert').textContent  = data.error || 'Reset failed. Link may be expired.';
          document.getElementById('errorAlert').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('errorAlert').textContent  = 'Connection error. Please try again.';
        document.getElementById('errorAlert').style.display = 'block';
      } finally {
        resetBtn.disabled  = false;
        resetBtnText.textContent = 'Update Password';
      }
    }

    resetBtn.addEventListener('click', doReset);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
